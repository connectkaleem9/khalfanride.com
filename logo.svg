<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">

  <!-- ── NAVY R ── -->
  <!-- Left vertical stem -->
  <rect x="60" y="60" width="72" height="230" rx="5" fill="#0A1D2E"/>
  <!-- Bowl top bar -->
  <path d="M60 60 L200 60 C310 60 340 85 340 155 C340 210 310 235 220 242 L132 245 Z" fill="#0A1D2E"/>
  <!-- Bowl inner cutout -->
  <path d="M132 95 L195 95 C275 95 295 115 295 155 C295 193 272 208 195 210 L132 210 Z" fill="white"/>
  <!-- Diagonal leg -->
  <polygon points="132,242 265,242 370,390 240,390" fill="#0A1D2E"/>

  <!-- ── GOLD ROAD SWEEP ── -->
  <!-- Thick saffron road curves up-right through the R bowl -->
  <path d="M60 60
           L200 60
           C330 60 375 90 375 155
           C375 220 335 255 210 258
           L132 258
           L132 210
           L195 210
           C272 208 295 193 295 155
           C295 115 275 95 195 95
           L132 95 Z"
        fill="#EBA815"/>

  <!-- Road surface (slightly lighter inner band) -->
  <path d="M132 95 L192 95 C268 95 288 113 288 155 C288 196 267 207 192 207 L132 207
           L132 252 L208 252 C320 252 348 218 348 155 C348 88 310 72 200 72 L132 72 Z"
        fill="#F5C518" opacity="0.35"/>

  <!-- Road dashes inside gold band -->
  <line x1="164" y1="103" x2="164" y2="122" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="165" y1="132" x2="165" y2="151" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="166" y1="161" x2="166" y2="180" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="167" y1="190" x2="167" y2="207" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Road continues down the diagonal leg -->
  <polygon points="132,210 132,258 170,258 170,215" fill="#EBA815"/>
  <line x1="151" y1="218" x2="151" y2="235" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="152" y1="244" x2="152" y2="258" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- ── SAUDI SKYLINE (inside bowl, navy) ── -->
  <!-- Ground line -->
  <rect x="140" y="178" width="135" height="2" fill="#0A1D2E"/>

  <!-- Left small buildings -->
  <rect x="143" y="170" width="6"  height="10" fill="#0A1D2E"/>
  <rect x="151" y="163" width="8"  height="17" fill="#0A1D2E"/>

  <!-- Kingdom Centre — twin pillars + arch gap + top bar -->
  <rect x="162" y="123" width="8"  height="57" fill="#0A1D2E"/>
  <rect x="180" y="123" width="8"  height="57" fill="#0A1D2E"/>
  <rect x="162" y="123" width="26" height="7"  fill="#0A1D2E"/>
  <rect x="162" y="155" width="26" height="25" fill="#0A1D2E"/>
  <!-- arch gap 130-155 is naturally white -->

  <!-- Burj Rafal — slim spire -->
  <rect x="192" y="133" width="6"  height="47" fill="#0A1D2E"/>
  <polygon points="192,133 198,133 195,120" fill="#0A1D2E"/>

  <!-- Mosque dome + minaret -->
  <rect x="202" y="158" width="18" height="22" fill="#0A1D2E"/>
  <path d="M202 158 Q211 145 220 158 Z" fill="#0A1D2E"/>
  <rect x="222" y="151" width="5"  height="29" fill="#0A1D2E"/>

  <!-- Pointed tower -->
  <rect x="230" y="143" width="7"  height="37" fill="#0A1D2E"/>
  <polygon points="230,143 237,143 233.5,133" fill="#0A1D2E"/>

  <!-- Palm tree -->
  <rect x="241" y="160" width="4" height="20" fill="#0A1D2E"/>
  <path d="M243 160 C235 152,228 154,228 158 C231 156,238 158,243 160" fill="#0A1D2E"/>
  <path d="M243 160 C251 151,256 153,256 157 C253 155,248 157,243 160" fill="#0A1D2E"/>

  <!-- Right buildings -->
  <rect x="249" y="162" width="7"  height="18" fill="#0A1D2E"/>
  <rect x="258" y="167" width="6"  height="13" fill="#0A1D2E"/>
  <rect x="266" y="170" width="7"  height="10" fill="#0A1D2E"/>

  <!-- ── TAXI CAR (foreground, larger, front 3/4) ── -->
  <!-- Speed lines left -->
  <line x1="20"  y1="330" x2="68"  y2="330" stroke="#EBA815" stroke-width="5" stroke-linecap="round"/>
  <line x1="10"  y1="345" x2="66"  y2="345" stroke="#EBA815" stroke-width="3" stroke-linecap="round"/>
  <line x1="20"  y1="359" x2="68"  y2="359" stroke="#EBA815" stroke-width="2" stroke-linecap="round"/>

  <!-- Speed lines right -->
  <line x1="348" y1="330" x2="396" y2="330" stroke="#EBA815" stroke-width="5" stroke-linecap="round"/>
  <line x1="350" y1="345" x2="400" y2="345" stroke="#EBA815" stroke-width="3" stroke-linecap="round"/>
  <line x1="348" y1="359" x2="394" y2="359" stroke="#EBA815" stroke-width="2" stroke-linecap="round"/>

  <!-- Car body cabin -->
  <path d="M75 345 L98 303 L318 303 L342 345 Z" fill="#0A1D2E"/>
  <!-- Car lower chassis -->
  <rect x="68" y="343" width="278" height="32" rx="5" fill="#0A1D2E"/>

  <!-- Windows -->
  <path d="M100 343 L117 308 L205 308 L205 343 Z" fill="#1A3355"/>
  <path d="M215 308 L312 308 L328 343 L215 343 Z" fill="#1A3355"/>
  <rect x="203" y="306" width="8" height="38" fill="#0A1D2E"/>

  <!-- Headlights -->
  <rect x="70"  y="347" width="26" height="12" rx="4" fill="#EBA815"/>
  <rect x="318" y="347" width="26" height="12" rx="4" fill="#EBA815"/>

  <!-- Bumper stripe -->
  <rect x="100" y="358" width="62" height="7" rx="2" fill="#EBA815"/>
  <rect x="252" y="358" width="62" height="7" rx="2" fill="#EBA815"/>

  <!-- Wheels -->
  <ellipse cx="138" cy="375" rx="33" ry="16" fill="#0A1D2E"/>
  <ellipse cx="138" cy="375" rx="21" ry="10" fill="#2a2a3e"/>
  <ellipse cx="138" cy="375" rx="9"  ry="4.5" fill="#0A1D2E"/>

  <ellipse cx="278" cy="375" rx="33" ry="16" fill="#0A1D2E"/>
  <ellipse cx="278" cy="375" rx="21" ry="10" fill="#2a2a3e"/>
  <ellipse cx="278" cy="375" rx="9"  ry="4.5" fill="#0A1D2E"/>

  <!-- TAXI roof sign -->
  <rect x="155" y="294" width="106" height="17" rx="4" fill="#EBA815"/>
  <rect x="159" y="297" width="9"  height="9" fill="#0A1D2E"/>
  <rect x="175" y="297" width="9"  height="9" fill="#0A1D2E"/>
  <rect x="191" y="297" width="9"  height="9" fill="#0A1D2E"/>
  <rect x="207" y="297" width="9"  height="9" fill="#0A1D2E"/>
  <rect x="223" y="297" width="9"  height="9" fill="#0A1D2E"/>
  <rect x="239" y="297" width="9"  height="9" fill="#0A1D2E"/>

  <!-- ── TEXT BLOCK ── -->
  <!-- KhalfanRide -->
  <text y="420"
        font-family="'Montserrat','Arial Black',Impact,sans-serif"
        font-weight="900"
        font-style="italic"
        font-size="62"
        letter-spacing="-1">
    <tspan x="45" fill="#0A1D2E">Khalfan</tspan><tspan fill="#EBA815">Ride</tspan>
  </text>

  <!-- Gold lines flanking tagline -->
  <line x1="45"  y1="433" x2="130" y2="433" stroke="#EBA815" stroke-width="1.5"/>
  <text x="255" y="437"
        font-family="Georgia,'Times New Roman',serif"
        font-style="italic"
        font-size="15"
        fill="#0A1D2E"
        text-anchor="middle"
        letter-spacing="0.5">Your Journey, Our Priority</text>
  <line x1="375" y1="433" x2="460" y2="433" stroke="#EBA815" stroke-width="1.5"/>

  <!-- Location pin -->
  <path d="M255 447 C255 444,251 440,251 436 C251 432,253 430,255 430 C257 430,259 432,259 436 C259 440,255 447,255 447 Z" fill="#EBA815"/>
  <circle cx="255" cy="436" r="2.5" fill="white"/>

  <!-- SAUDI ARABIA -->
  <text x="255" y="465"
        font-family="Arial,Helvetica,sans-serif"
        font-weight="700"
        font-size="13"
        fill="#0A1D2E"
        text-anchor="middle"
        letter-spacing="6">SAUDI ARABIA</text>

</svg>
