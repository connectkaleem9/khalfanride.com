<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 95" width="320" height="95">

  <!-- ══════════════════════════════
       ICON AREA (0 – 95)
  ══════════════════════════════ -->

  <!-- ── Saudi Skyline silhouette (navy) ── -->

  <!-- Far-left low buildings -->
  <rect x="1"  y="58" width="5"  height="17" fill="#0A1D2E"/>
  <rect x="8"  y="50" width="7"  height="25" fill="#0A1D2E"/>
  <rect x="17" y="55" width="5"  height="20" fill="#0A1D2E"/>

  <!-- Medium tower with pointed spire (left of centre) -->
  <rect    x="24" y="40" width="8"  height="35" fill="#0A1D2E"/>
  <polygon points="24,40 32,40 28,32"          fill="#0A1D2E"/>

  <!-- ── Kingdom Centre Tower (tallest, centrepiece) ── -->
  <!-- Bottom solid slab -->
  <rect x="34" y="32" width="22" height="43" fill="#0A1D2E"/>
  <!-- Left pillar rising above slab -->
  <rect x="34" y="8"  width="7"  height="26" fill="#0A1D2E"/>
  <!-- Right pillar -->
  <rect x="49" y="8"  width="7"  height="26" fill="#0A1D2E"/>
  <!-- Top bar connecting pillars (cap) -->
  <rect x="34" y="8"  width="22" height="5"  fill="#0A1D2E"/>
  <!-- The gap between the pillars = the Kingdom Centre arch opening (white = background) -->

  <!-- ── Burj Rafal (right of KC) — slightly shorter, tapered spire ── -->
  <rect    x="59" y="20" width="8"  height="55" fill="#0A1D2E"/>
  <polygon points="59,20 67,20 63,11"          fill="#0A1D2E"/>

  <!-- Right background buildings -->
  <rect x="70" y="38" width="7"  height="37" fill="#0A1D2E"/>
  <rect x="79" y="44" width="8"  height="31" fill="#0A1D2E"/>
  <rect x="89" y="54" width="5"  height="21" fill="#0A1D2E"/>

  <!-- Ground base line -->
  <rect x="0" y="73" width="96" height="2" rx="1" fill="#0A1D2E"/>

  <!-- ── Gold winding road ── -->
  <path d="M 2 75 C 18 69, 34 81, 50 75 C 66 69, 80 79, 94 75"
        stroke="#EBA815" stroke-width="3.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Sedan car with taxi sign ── -->
  <!-- Car body (cabin) -->
  <path d="M 23 72 L 27 63 L 63 63 L 67 72 Z" fill="#0A1D2E"/>
  <!-- Car body (lower chassis) -->
  <rect x="21" y="71" width="48" height="7" rx="2" fill="#0A1D2E"/>
  <!-- Front windshield highlight (gold tint) -->
  <path d="M 27 71 L 30 64 L 44 64 L 44 71 Z" fill="#EBA815" opacity="0.55"/>
  <!-- Rear window highlight -->
  <path d="M 46 64 L 60 64 L 63 71 L 46 71 Z" fill="#EBA815" opacity="0.55"/>
  <!-- Front wheel -->
  <circle cx="31" cy="78" r="4.5" fill="#0A1D2E"/>
  <circle cx="31" cy="78" r="2"   fill="#EBA815"/>
  <!-- Rear wheel -->
  <circle cx="59" cy="78" r="4.5" fill="#0A1D2E"/>
  <circle cx="59" cy="78" r="2"   fill="#EBA815"/>
  <!-- Gold headlight -->
  <rect x="20" y="72" width="3" height="3" rx="0.5" fill="#EBA815"/>
  <!-- Taxi sign on roof -->
  <rect x="35" y="58" width="20" height="6" rx="1.5" fill="#EBA815"/>
  <text x="45" y="63.5"
        font-family="Arial, Helvetica, sans-serif"
        font-size="4.8"
        font-weight="900"
        fill="#0A1D2E"
        text-anchor="middle"
        letter-spacing="0.5">TAXI</text>

  <!-- ── Bold italic R integrated with road ── -->
  <text x="3" y="58"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="900"
        font-size="46"
        fill="#0A1D2E"
        opacity="0.08">R</text>

  <!-- ══════════════════════════════
       THIN DIVIDER
  ══════════════════════════════ -->
  <line x1="103" y1="8" x2="103" y2="88"
        stroke="#0A1D2E" stroke-width="1" opacity="0.12"/>

  <!-- ══════════════════════════════
       TEXT AREA (110 – 318)
  ══════════════════════════════ -->

  <!-- "KhalfanRide" — bold italic serif, navy + gold -->
  <text font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-weight="bold"
        font-size="34"
        y="48">
    <tspan x="110" fill="#0A1D2E">Khalfan</tspan><tspan fill="#EBA815">Ride</tspan>
  </text>

  <!-- Tagline -->
  <text x="111" y="64"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10"
        letter-spacing="0.6"
        fill="#6b7280"
        font-style="italic">Your Journey, Our Priority</text>

  <!-- SAUDI ARABIA -->
  <text x="111" y="80"
        font-family="Arial, Helvetica, sans-serif"
        font-size="8.5"
        font-weight="700"
        letter-spacing="3.5"
        fill="#EBA815">SAUDI ARABIA</text>

</svg>
